<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Creative Movie Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #14192f 0%, #1f2d59 45%, #3b5a97 100%);
            color: #eef2ff;
        }
        .navbar {
            background-color: rgba(10, 16, 42, 0.95);
        }
        .navbar a {
            color: #f8f9fa !important;
        }
        .hero {
            padding: 60px 0;
            background: rgba(217, 137, 137, 0.852);
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
        }
        .hero h1,
        .hero p {
            color: #eef2ff;
        }
        .card {
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
        }
        .card img {
            height: 300px;
            object-fit: cover;
        }
        .card-body h5 {
            color: #1b2537;
            font-weight: 700;
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.94);
            border: 1px solid #d9ddec;
        }
        .form-label,
        label {
            color: #1f2d46;
            font-weight: 600;
        }
        footer {
            background-color: rgba(10, 16, 42, 0.95);
            color: #cbd5f1;
            padding: 18px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand text-white" href="#">MovieHub</a>

        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#home">MovieHome</a></li>
                <li class="nav-item"><a class="nav-link" href="#gallery">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div id="home" class="container text-center hero">
    <h1>Creative highest Gross Movie Portfolio</h1>
    <p class="text-muted">Showcasing the best of Kollywood</p>
</div>

<div id="gallery" class="container">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="re1.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>bikerally </h5>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="re2.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>bikeride</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="re3.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>allindiaride</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="re4.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>royalenfieldcompany </h5>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="re5.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>dirtbikerally</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="re6.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>roadrally</h5>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="contact" class="container mt-5">
    <h3 class="text-center mb-4">Comment on this above movies </h3>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <form class="shadow p-4 bg-white rounded">
                
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" placeholder="Your Name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Your Email">
                </div>
                 <div class="mb-4">
                    <label class="tel">Ph No:</label>
                    <input type="tel" class="form-control" placeholder="Your Phone Number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="4" placeholder="comments on your favorite movies and actors"></textarea>
                </div>

                

                <button class="btn btn-dark w-100">Send Message</button>
            </form>
        </div>
    </div>
</div>

<footer class="text-center mt-5">
    <p>© 2026 MovieHub | Designed by Ashwin Kumar .M||212225040033</p>
</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
